[Translations]
$modDisplayName=Rain Drops
$modDescription=Immersive rain drops on the screen during raining and snowing.
$Rain=Rain
$Snow=Snow
$Enable=Enable
$EnableMouse=Whether the effect is enabled.
$1stPersonOnly=1st Person Only
$1stPersonOnlyMouse=Whether the effect only shows in first person view.
$Density=Density
$DensityMouse=Density of the rain drops on screen.
$Size=Size
$SizeMouse=A size multiplier for the drops.
$DropsStatic=Drops (Static)
$DropsStaticMouse=Whether static (not dripping) drops are enabled.
$DropsMoving=Drops (Moving)
$DropsMovingMouse=Whether dripping drops are enabled.
$Fogging=Fogging
$FoggingMouse=Whether the edges of the screen get foggy during rain.
$FogBlur=Fog (Blur)
$FogBlurMouse=Whether the fogging causes a slight blurring of the screen edges.
$FogTrails=Fog (Trails)
$FogTrailsMouse=Whether dripping drops leave trails on the foggy screen.
$FogColorInfluence=Fog (Color Influence)
$FogColorInfluenceMouse=How much the current weather fog color influences the fogging.
$FadeIn=Fade In (Seconds)
$FadeInMouse=How long it takes for the effect to reach full intensity.
$FadeOut=Fade Out (Seconds)
$FadeOutMouse=How long it takes for the effect to stop.
